<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <title>Calculadora</title>

    <style>
        body {
            overflow: hidden;
            margin: 0;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            font-family: Arial;
            padding-top: 60px;
            overflow-x: hidden;
        }
        /* ===== TOPO ESQUERDO ===== */
        
        .topo-esquerdo {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }
        /* ===== TEXTO DO SITE ===== */
        
        .conteudo {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 5px;
            margin-bottom: 20px;
        }
        
        .titulo {
            font-size: 42px;
            font-weight: 700;
            color: #222;
            margin: 0;
        }
        
        .subtitulo {
            font-size: 16px;
            color: #666;
            margin-bottom: 20px;
        }
        /* ===== CALCULADORA (NÃO MEXI VISUALMENTE) ===== */
        
        .calculadora {
            background: #2b2b2b;
            padding: 30px;
            border-radius: 30px;
            width: 280px;
            transform: scale(1.2);
            transform-origin: center;
            margin-top: 100px;
            /* 👈 COLOCA ISSO AQUI */
        }
        /* ===== DISPLAY ===== */
        
        .display {
            background: #c5c5c5;
            color: #000000;
            font-size: 28px;
            height: 60px;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            overflow: hidden;
            white-space: nowrap;
        }
        
        #display {
            display: block;
            width: 100%;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            font-weight: 700;
            font-family: Arial, sans-serif;
        }
        /* ===== BOTÕES ===== */
        
        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        
        button {
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #444;
            color: white;
            font-family: Arial, sans-serif;
            font-weight: 700;
        }
        
        button:hover {
            background: #666;
        }
        
        .igual {
            background: #0078d7;
        }
        
        .limpar {
            background: #d83b01;
        }
        
        .conteudo {
            margin-top: 10px;
        }
        
        .subtitulo {
            margin-top: 5px;
            line-height: 1.3;
        }
        
        .erro {
            color: #000000;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <div class="topo-esquerdo">
        Calculadora Online
    </div>

    <div class="conteudo">
        <h1 class="titulo">Calculadora Online</h1>
        <p class="subtitulo">Faça cálculos simples de forma rápida e fácil</p>

        <div class="calculadora">
            <div class="display">
                <div id="display">0</div>
            </div>

            <div class="botoes">
                <button class="limpar" onclick="limpar()">C</button>
                <button onclick="raiz()">√</button>
                <button onclick="add('%')">%</button>
                <button onclick="add('/')">÷</button>

                <button onclick="add('7')">7</button>
                <button onclick="add('8')">8</button>
                <button onclick="add('9')">9</button>
                <button onclick="add('*')">×</button>

                <button onclick="add('4')">4</button>
                <button onclick="add('5')">5</button>
                <button onclick="add('6')">6</button>
                <button onclick="add('-')">-</button>

                <button onclick="add('1')">1</button>
                <button onclick="add('2')">2</button>
                <button onclick="add('3')">3</button>
                <button onclick="add('+')">+</button>

                <button onclick="add('.')">.</button>
                <button onclick="add('0')">0</button>
                <button onclick="add('^')">xʸ</button>
                <button class="igual" onclick="calcular()">=</button>
            </div>
        </div>
    </div>

</body>

<script>
    const sup = {
        "0": "⁰",
        "1": "¹",
        "2": "²",
        "3": "³",
        "4": "⁴",
        "5": "⁵",
        "6": "⁶",
        "7": "⁷",
        "8": "⁸",
        "9": "⁹"
    };

    let modoRaiz = false;

    let modoExpoente = false;

    let display = document.getElementById("display");

    function atualizarScroll() {
        display.scrollTo({
            left: display.scrollWidth,
            behavior: "smooth",
        });
    }

    function add(v) {
        if (display.innerText === "0" || display.innerText === "Erro") {
            display.innerText = "";
        }

        const ultimo = display.innerText.slice(-1);

        const operadores = ["+", "-", "*", "/", "^"];

        const ultimoEhOperador = operadores.includes(ultimo);
        const novoEhOperador = operadores.includes(v);

        // impede dois operadores seguidos
        if (ultimoEhOperador && novoEhOperador) return;

        // porcentagem
        if (v === "%") {
            display.innerText += "%";
            return;
        }

        // potência
        if (v === "^") {
            display.innerText += "^";
            return;
        }

        let visivel = v;
        if (v === "*") visivel = "×";
        if (v === "/") visivel = "÷";

        display.innerText += visivel;
    }

    function limpar() {
        display.innerText = "0";
        display.classList.remove("erro-divisao", "erro-grande", "erro-geral"); // 🔥 garante que volta ao normal
        atualizarScroll();
    }

    function calcular() {
        try {
            let expressao = display.innerText;

            // limpa símbolos visuais
            expressao = expressao.replaceAll("×", "*");
            expressao = expressao.replaceAll("÷", "/");

            // porcentagem correta (50% + 60 = 0.5 + 60)
            expressao = expressao.replace(/(\d+(\.\d+)?)%/g, "($1/100)");

            // potência estilo JS
            expressao = expressao.replaceAll("^", "**");

            if (!expressao || expressao.trim() === "") {
                display.innerText = "Erro";
                return;
            }

            let resultado = eval(expressao);

            if (!isFinite(resultado)) {
                display.innerText = "Erro";
                return;
            }

            display.innerText = resultado;

        } catch (e) {
            display.innerText = "Erro";
        }
    }

    function raiz() {

        if (display.innerText === "0") {
            display.innerText = "√(";
        } else {
            display.innerText += "√(";
        }

        atualizarScroll();
    }
    display.addEventListener("wheel", function(e) {
        e.preventDefault();

        const maxScroll = display.scrollWidth - display.clientWidth;

        if (maxScroll > 0) {
            display.scrollLeft += e.deltaY;
        }
    });

    document.addEventListener("keydown", function(e) {
        const key = e.key;

        // evita comportamento estranho do navegador
        if (key === "Enter") e.preventDefault();

        // números
        if (!isNaN(key)) {
            add(key);
            return;
        }

        // operadores
        if (key === "+") return add("+");
        if (key === "-") return add("-");
        if (key === "*") return add("*");
        if (key === "/") return add("/");
        if (key === "%") return add("%");

        // ponto
        if (key === ".") return add(".");

        // 🔥 ENTER = calcular
        if (key === "Enter") {
            calcular();
            return;
        }

        // 🔥 "=" pode vir como "=" OU "Equal"
        if (key === "=" || key === "Equal") {
            calcular();
            return;
        }

        // Backspace
        if (key === "Backspace") {
            display.innerText = display.innerText.slice(0, -1) || "0";
            return;
        }
    });
</script>
</body>

</html>
